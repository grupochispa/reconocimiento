<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MarquesCheck</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50:'#f0f9ff',100:'#e0f2fe',600:'#0284c7',700:'#0369a1',900:'#0c4a6e' } }
                }
            }
        }
    </script>
    <style>
        .tab-active { border-bottom: 3px solid #0284c7; color: #0284c7; font-weight: 700; }
        .tab-inactive { color: #6b7280; font-weight: 600; border-bottom: 3px solid transparent; }
        .tab-inactive:hover { color: #374151; border-color: #e5e7eb; }
        #appContainer { display: none; }
        #loginContainer { display: flex; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 antialiased min-h-screen flex flex-col">

<div id="loginContainer" class="flex-1 items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold text-brand-900">MarquesCheck <span class="text-amber-500">Admin</span></h1>
            <p class="text-sm text-gray-500 mt-1">Ingresa tus credenciales para continuar</p>
        </div>
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" id="email" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-100 focus:border-brand-600 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="password" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-100 focus:border-brand-600 outline-none transition">
            </div>
            <button type="submit" id="btnLogin" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl transition shadow-md">
                Iniciar Sesión
            </button>
        </form>
    </div>
</div>

<div id="appContainer" class="flex-1 flex-col">
    <header class="bg-[#1a2b56] shadow-md px-6 py-4 flex justify-between items-center z-20 relative">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
            <h1 class="text-xl font-extrabold text-white">Panel de <span class="text-amber-400">Compensaciones</span></h1>
        </div>
        <button id="btnLogout" class="text-sm font-semibold text-blue-200 hover:text-white transition">Cerrar Sesión</button>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-6">
        <div class="flex gap-6 border-b border-gray-200 mb-6">
            <button class="tab-btn tab-active pb-3 px-2 transition" data-status="PENDIENTE">⏳ Pendientes</button>
            <button class="tab-btn tab-inactive pb-3 px-2 transition" data-status="APROBADO">✅ Procesados (Aprobados)</button>
            <button class="tab-btn tab-inactive pb-3 px-2 transition" data-status="RECHAZADO">❌ Rechazados</button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b border-gray-100">
                            <th class="p-4 font-bold">Fecha</th>
                            <th class="p-4 font-bold">Vendedor</th>
                            <th class="p-4 font-bold">Cliente</th>
                            <th class="p-4 font-bold">Producto</th>
                            <th class="p-4 font-bold">Tipo Cierre</th>
                            <th class="p-4 font-bold text-right">Monto ($)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
            <div id="emptyState" class="hidden p-10 text-center text-gray-500">
                <p class="font-medium">No hay registros en esta categoría.</p>
            </div>
        </div>
    </main>
</div>

<div id="detailModal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-[1000] hidden items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden transform scale-95 opacity-0 transition-all duration-300" id="detailPanel">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <div>
                <h3 class="text-lg font-extrabold text-gray-900">Detalle de Compensación</h3>
                <p id="modalSubtitle" class="text-sm text-gray-500">ID: ...</p>
            </div>
            <button id="btnCloseModal" class="text-gray-400 hover:text-gray-600 bg-gray-200 hover:bg-gray-300 p-2 rounded-full transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        
        <div class="p-6 overflow-y-auto flex-1 bg-white space-y-6" id="modalContent">
            </div>

        <div id="modalActions" class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
            <button id="btnEditar" class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 font-bold rounded-xl hover:bg-gray-50 transition">✏️ Editar Obs.</button>
            <button id="btnRechazar" class="px-5 py-2.5 bg-red-100 text-red-700 font-bold rounded-xl hover:bg-red-200 transition">❌ Rechazar</button>
            <button id="btnAprobar" class="px-5 py-2.5 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 transition shadow-md">✅ Aprobar</button>
        </div>
    </div>
</div>

<script>
// ─── Supabase ─────────────────────────────────────────────────
const SUPABASE_URL      = 'https://zgbsrbjtjnozpzxifpua.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnYnNyYmp0am5venB6eGlmcHVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQzNjI5MjUsImV4cCI6MjA2OTkzODkyNX0.zHVKe6Ab73PFhQqD3Au94x1Z71hMyRpxE1PCWP8-QTI';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── Estado y UI ──────────────────────────────────────────────
let currentStatus = 'PENDIENTE';
let compensaciones = [];
let currentRecord = null;

const loginContainer = document.getElementById('loginContainer');
const appContainer = document.getElementById('appContainer');
const tableBody = document.getElementById('tableBody');
const emptyState = document.getElementById('emptyState');
const modal = document.getElementById('detailModal');
const detailPanel = document.getElementById('detailPanel');

// ─── Autenticación ────────────────────────────────────────────
async function checkUser() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        loginContainer.style.display = 'none';
        appContainer.style.display = 'flex';
        loadData();
    } else {
        loginContainer.style.display = 'flex';
        appContainer.style.display = 'none';
    }
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    btn.textContent = 'Verificando...'; btn.disabled = true;
    const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    });
    btn.textContent = 'Iniciar Sesión'; btn.disabled = false;
    
    if (error) alert('Error: ' + error.message);
    else checkUser();
});

document.getElementById('btnLogout').addEventListener('click', async () => {
    await sb.auth.signOut();
    checkUser();
});

// ─── Carga de Datos ───────────────────────────────────────────
async function loadData() {
    tableBody.innerHTML = '<tr><td colspan="6" class="text-center p-4 text-gray-500">Cargando registros...</td></tr>';
    
    const { data, error } = await sb
        .from('compensaciones')
        .select('*')
        .eq('estado_proceso', currentStatus)
        .order('created_at', { ascending: false });

    if (error) {
        alert('Error al cargar datos: ' + error.message);
        return;
    }

    compensaciones = data;
    renderTable();
}

function renderTable() {
    tableBody.innerHTML = '';
    if (compensaciones.length === 0) {
        emptyState.classList.remove('hidden');
    } else {
        emptyState.classList.add('hidden');
        compensaciones.forEach(row => {
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-brand-50 cursor-pointer transition border-b border-gray-50';
            tr.onclick = () => openModal(row);
            
            const date = new Date(row.created_at).toLocaleDateString('es-VE', { day:'2-digit', month:'short', year:'numeric' });
            
            tr.innerHTML = `
                <td class="p-4 whitespace-nowrap text-gray-600">${date}</td>
                <td class="p-4 font-semibold text-brand-900">${row.promotor_nombre}</td>
                <td class="p-4 text-gray-800">${row.cliente_nombre}</td>
                <td class="p-4"><span class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-bold">${row.producto}</span></td>
                <td class="p-4"><span class="bg-purple-100 text-purple-700 px-2 py-1 rounded text-xs font-bold">${row.tipo_cierre}</span></td>
                <td class="p-4 font-extrabold text-green-600 text-right">$${row.total_compensar.toFixed(2)}</td>
            `;
            tableBody.appendChild(tr);
        });
    }
}

// ─── Navegación por Tabs ──────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('tab-active');
            b.classList.add('tab-inactive');
        });
        e.target.classList.remove('tab-inactive');
        e.target.classList.add('tab-active');
        
        currentStatus = e.target.dataset.status;
        loadData();
    });
});

// ─── Modal y Detalle ──────────────────────────────────────────
function openModal(data) {
    currentRecord = data;
    document.getElementById('modalSubtitle').textContent = `Registro: ${data.id} | Creado: ${new Date(data.created_at).toLocaleString('es-VE')}`;
    
    // Controles de botones según estado
    const actions = document.getElementById('modalActions');
    if(data.estado_proceso === 'PENDIENTE') {
        actions.style.display = 'flex';
    } else {
        actions.style.display = 'none'; // Si ya se aprobó o rechazó, ocultamos las acciones.
    }

    const html = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-6">
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <h4 class="text-xs font-bold text-gray-500 uppercase mb-3">Información General</h4>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div><p class="text-gray-500">Vendedor</p><p class="font-bold">${data.promotor_nombre}</p></div>
                        <div><p class="text-gray-500">Cliente</p><p class="font-bold">${data.cliente_nombre}</p></div>
                        <div><p class="text-gray-500">Producto</p><p class="font-bold text-brand-700">${data.producto}</p></div>
                        <div><p class="text-gray-500">Tipo de Cierre</p><p class="font-bold">${data.tipo_cierre} ${data.precio_fijo_cliente ? `($${data.precio_fijo_cliente})` : ''}</p></div>
                    </div>
                    ${data.observaciones ? `<div class="mt-3 pt-3 border-t border-gray-200"><p class="text-gray-500 text-xs">Observaciones</p><p class="text-sm text-gray-800">${data.observaciones}</p></div>` : ''}
                </div>

                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <h4 class="text-xs font-bold text-blue-800 uppercase mb-3">Factura Anterior: ${data.numero_factura}</h4>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <p class="text-gray-600">Pacas Compradas:</p><p class="font-bold text-right">${data.pacas_factura}</p>
                        <p class="text-gray-600">Pacas Promo:</p><p class="font-bold text-right">${data.promo_regalo}</p>
                        <p class="text-gray-600">Precio Bruto:</p><p class="font-bold text-right">$${data.precio_compra}</p>
                        <p class="text-gray-600">Prontopago:</p><p class="font-bold text-right">${data.prontopago_anterior_pct || 0}%</p>
                        <div class="col-span-2 border-t border-blue-200 my-1"></div>
                        <p class="text-blue-800 font-bold">Precio Neto Final:</p><p class="font-extrabold text-blue-800 text-right">$${data.precio_anterior}</p>
                    </div>
                </div>

                <div class="bg-amber-50 p-4 rounded-xl border border-amber-100">
                    <h4 class="text-xs font-bold text-amber-800 uppercase mb-3">Valores Nuevos de Mercado</h4>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <p class="text-gray-600">Pacas Estimadas:</p><p class="font-bold text-right">${data.pacas_totales}</p>
                        <p class="text-gray-600">Pacas Promo:</p><p class="font-bold text-right">${data.pacas_regaladas}</p>
                        <p class="text-gray-600">Precio Bruto:</p><p class="font-bold text-right">$${data.precio_actual}</p>
                        <p class="text-gray-600">Prontopago:</p><p class="font-bold text-right">${data.prontopago_actual_pct || 0}%</p>
                        <div class="col-span-2 border-t border-amber-200 my-1"></div>
                        <p class="text-amber-800 font-bold">Precio Neto Final:</p><p class="font-extrabold text-amber-800 text-right">$${data.precio_final}</p>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-green-50 p-5 rounded-xl border border-green-200 shadow-inner">
                    <h4 class="text-xs font-bold text-green-800 uppercase mb-4">Resultado de Compensación</h4>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between"><span class="text-gray-600">Inv. a Reconocer:</span><span class="font-bold">${data.pacas_a_reconocer} pacas</span></div>
                        <div class="flex justify-between"><span class="text-gray-600">Diferencia / Paca:</span><span class="font-bold text-orange-600">$${data.diferencia_paca}</span></div>
                        <div class="flex justify-between items-center py-3 border-t border-b border-green-200 bg-green-100/50 -mx-5 px-5 my-2">
                            <span class="font-extrabold text-green-800">TOTAL NOTA CRÉDITO:</span>
                            <span class="font-black text-2xl text-green-700">$${data.total_compensar}</span>
                        </div>
                        <div class="flex justify-between"><span class="text-gray-600">Equivalente en prod:</span><span class="font-bold text-brand-700">+${data.pacas_a_entregar} pacas</span></div>
                    </div>
                </div>

                <div>
                    <h4 class="text-xs font-bold text-gray-500 uppercase mb-3">Evidencias Fotográficas (${data.fotos_inventario ? data.fotos_inventario.length : 0})</h4>
                    ${data.fotos_inventario && data.fotos_inventario.length > 0 ? `
                        <div class="grid grid-cols-3 gap-2">
                            ${data.fotos_inventario.map(url => `
                                <a href="${url}" target="_blank" class="block aspect-square rounded-lg overflow-hidden border border-gray-200 hover:opacity-80 transition">
                                    <img src="${url}" class="w-full h-full object-cover">
                                </a>
                            `).join('')}
                        </div>
                    ` : '<p class="text-sm text-gray-400 italic">No se adjuntaron fotos.</p>'}
                </div>
            </div>
        </div>
    `;
    
    document.getElementById('modalContent').innerHTML = html;
    
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    setTimeout(() => {
        detailPanel.classList.remove('scale-95', 'opacity-0');
        detailPanel.classList.add('scale-100', 'opacity-100');
    }, 10);
}

function closeModal() {
    detailPanel.classList.remove('scale-100', 'opacity-100');
    detailPanel.classList.add('scale-95', 'opacity-0');
    setTimeout(() => {
        modal.classList.remove('flex');
        modal.classList.add('hidden');
        currentRecord = null;
    }, 300);
}

document.getElementById('btnCloseModal').addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

// ─── Acciones (Aprobar / Rechazar / Editar) ───────────────────
async function updateStatus(newStatus) {
    if (!currentRecord) return;
    
    // Mostramos estado de carga en el botón
    const btn = newStatus === 'APROBADO' ? document.getElementById('btnAprobar') : document.getElementById('btnRechazar');
    const originalText = btn.innerHTML;
    btn.innerHTML = 'Procesando...';
    btn.disabled = true;

    const { error } = await sb
        .from('compensaciones')
        .update({ estado_proceso: newStatus })
        .eq('id', currentRecord.id);

    if (error) {
        alert('Error al actualizar: ' + error.message);
        btn.innerHTML = originalText;
        btn.disabled = false;
        return;
    }

    closeModal();
    loadData(); // Recarga la tabla para reflejar el cambio
}

document.getElementById('btnAprobar').addEventListener('click', () => {
    if(confirm('¿Estás seguro de APROBAR esta compensación?')) {
        updateStatus('APROBADO');
    }
});

document.getElementById('btnRechazar').addEventListener('click', () => {
    if(confirm('¿Estás seguro de RECHAZAR esta compensación?')) {
        updateStatus('RECHAZADO');
    }
});

// Botón Editar: Ejemplo sencillo para editar las observaciones
document.getElementById('btnEditar').addEventListener('click', async () => {
    if (!currentRecord) return;
    const nuevaObs = prompt('Editar observaciones:', currentRecord.observaciones || '');
    
    if (nuevaObs !== null && nuevaObs !== currentRecord.observaciones) {
        const { error } = await sb
            .from('compensaciones')
            .update({ observaciones: nuevaObs })
            .eq('id', currentRecord.id);
            
        if (error) {
            alert('Error al actualizar: ' + error.message);
        } else {
            alert('Observación actualizada correctamente.');
            currentRecord.observaciones = nuevaObs;
            openModal(currentRecord); // Refrescar modal
            loadData(); // Refrescar fondo
        }
    }
});

// Iniciar
checkUser();
</script>
</body>
</html>
